<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flowcraft — AI workflows for your daily work</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f5f5f7;
  --bg-tint: #e8e8ed;
  --paper: #ffffff;
  --ink: #000000;
  --ink-2: #1d1d1f;
  --muted: #86868b;
  --line: #e5e5ea;
  --line-soft: #f5f5f7;
  --forest: #000000;
  --forest-2: #1d1d1f;
  --amber: #000000;
  --amber-soft: #e5e5ea;
  --moss: #000000;
  --rose: #000000;
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --shadow-soft: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
  --shadow-card: 0 4px 14px rgba(0, 0, 0, 0.02), 0 0 0 1px rgba(0, 0, 0, 0.04);
  --transition: 0.32s cubic-bezier(0.2, 0.7, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.serif { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-weight: 600; letter-spacing: -0.03em; }
.serif-i { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-weight: 600; letter-spacing: -0.03em; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }

.container {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 32px;
  position: relative;
  z-index: 2;
}

/* ---------- NAV ---------- */
nav {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  background: rgba(246, 243, 236, 0.78);
  border-bottom: 1px solid transparent;
  transition: border-color var(--transition);
}
nav.scrolled { border-bottom-color: var(--line); }

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  max-width: 1240px;
  margin: 0 auto;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 19px;
  letter-spacing: -0.02em;
  color: var(--ink);
  text-decoration: none;
}
.logo-mark {
  width: 28px;
  height: 28px;
  background: var(--forest);
  border-radius: 8px;
  display: grid;
  place-items: center;
  color: #ffffff;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 19px;
  line-height: 1;
}
.logo-name { font-weight: 500; }
.logo-name em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: var(--forest); }

.nav-links {
  display: flex;
  gap: 36px;
  align-items: center;
}
.nav-links a {
  color: var(--ink-2);
  text-decoration: none;
  font-size: 14.5px;
  font-weight: 400;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--ink); }

.btn {
  font-family: inherit;
  border: none;
  cursor: pointer;
  font-size: 14.5px;
  font-weight: 500;
  padding: 11px 20px;
  border-radius: 999px;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.btn-primary {
  background: var(--forest);
  color: #ffffff;
  box-shadow: var(--shadow-soft);
}
.btn-primary:hover {
  background: var(--forest-2);
  transform: translateY(-1px);
  box-shadow: 0 1px 2px rgba(26,26,23,0.06), 0 12px 28px -10px rgba(31,68,56,0.35);
}
.btn-secondary {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--line);
}
.btn-secondary:hover { border-color: var(--ink); background: var(--paper); }
.btn-ghost { background: transparent; color: var(--ink-2); padding: 8px 14px; }
.btn-ghost:hover { color: var(--ink); }

.btn-lg { padding: 14px 26px; font-size: 15.5px; }

@media (max-width: 780px) {
  .nav-links { display: none; }
  .nav-inner { padding: 14px 20px; }
}

/* ---------- HERO ---------- */
.hero {
  padding: 80px 0 60px;
  position: relative;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px 6px 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--paper);
  font-size: 13px;
  color: var(--ink-2);
  margin-bottom: 32px;
  letter-spacing: 0.01em;
}
.hero-eyebrow-dot {
  width: 22px; height: 22px;
  background: var(--amber-soft);
  color: var(--amber);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 12px;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 72px;
  align-items: center;
}

.hero h1 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: clamp(48px, 6.6vw, 88px);
  line-height: 0.98;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-bottom: 28px;
}
.hero h1 em {
  font-style: italic;
  color: var(--forest);
  display: inline-block;
}
.hero h1 .underline {
  position: relative;
  display: inline-block;
}
.hero h1 .underline::after {
  content: '';
  position: absolute;
  left: 2%;
  right: 2%;
  bottom: 6px;
  height: 6px;
  background: var(--amber-soft);
  z-index: -1;
  border-radius: 2px;
}

.hero p.lede {
  font-size: 18px;
  line-height: 1.55;
  color: var(--ink-2);
  max-width: 480px;
  margin-bottom: 36px;
}

.hero-ctas {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.hero-meta {
  margin-top: 44px;
  display: flex;
  gap: 28px;
  align-items: center;
  flex-wrap: wrap;
}
.hero-meta-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13.5px;
  color: var(--muted);
}
.hero-meta-item svg { color: var(--forest); }

/* hero visual — workflow demonstration */
.hero-visual {
  position: relative;
  height: 520px;
}

.flow-card {
  position: absolute;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 18px 20px;
  box-shadow: var(--shadow-card);
  font-size: 14px;
}

.flow-input {
  top: 0;
  left: 0;
  width: 260px;
  z-index: 3;
  animation: float-a 6s ease-in-out infinite;
}
.flow-process {
  top: 175px;
  right: 0;
  width: 280px;
  z-index: 2;
  animation: float-b 7s ease-in-out infinite;
}
.flow-output {
  bottom: 0;
  left: 30px;
  width: 290px;
  z-index: 3;
  animation: float-a 6s ease-in-out infinite reverse;
}

.flow-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.flow-label-dot {
  width: 6px; height: 6px; border-radius: 50%;
}

.flow-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-tint);
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12.5px;
  color: var(--ink-2);
  margin: 3px 3px 0 0;
}

.flow-process-steps {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 6px;
}
.flow-step-mini {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--ink-2);
}
.flow-step-num {
  width: 20px;
  height: 20px;
  background: var(--forest);
  color: #ffffff;
  border-radius: 6px;
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: 500;
  flex-shrink: 0;
}
.flow-process .flow-label-dot { background: var(--amber); }
.flow-input .flow-label-dot { background: var(--moss); }
.flow-output .flow-label-dot { background: var(--forest); }

/* SVG connector lines */
.flow-connectors {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.flow-connectors path {
  stroke: var(--line);
  stroke-width: 1.5;
  fill: none;
  stroke-dasharray: 4 4;
}

@keyframes float-a {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
@keyframes float-b {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(6px); }
}

@media (max-width: 980px) {
  .hero-grid { grid-template-columns: 1fr; gap: 60px; }
  .hero { padding: 50px 0 30px; }
  .hero-visual { height: 460px; max-width: 480px; margin: 0 auto; }
}

@media (max-width: 540px) {
  .container { padding: 0 20px; }
  .hero-visual { height: 440px; }
  .flow-input, .flow-process, .flow-output { width: 240px; }
  .flow-process { right: -10px; }
  .flow-output { left: 20px; }
}

/* ---------- GENERATOR ---------- */
.generator {
  padding: 40px 0;
  width: 100%;
}

.section-head {
  text-align: center;
  margin-bottom: 56px;
}
.section-head .tag {
  display: inline-block;
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  color: var(--amber);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.section-head h2 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: clamp(36px, 4.2vw, 54px);
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}
.section-head h2 em { font-style: italic; color: var(--forest); }
.section-head p {
  color: var(--ink-2);
  font-size: 17px;
  max-width: 540px;
  margin: 0 auto;
}

.generator-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 8px;
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

.generator-inner {
  background: linear-gradient(180deg, #FFFFFF 0%, #ffffff 100%);
  border-radius: 22px;
  padding: 36px;
}

/* step indicator */
.step-indicator {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 36px;
  flex-wrap: wrap;
}
.step-pip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px 8px 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--bg);
  font-size: 13.5px;
  color: var(--muted);
  transition: all var(--transition);
}
.step-pip-num {
  width: 22px; height: 22px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  font-family: 'Geist Mono', monospace;
}
.step-pip.active {
  background: var(--forest);
  border-color: var(--forest);
  color: #ffffff;
}
.step-pip.active .step-pip-num {
  background: #ffffff;
  color: var(--forest);
  border-color: transparent;
}
.step-pip.done {
  background: var(--paper);
  border-color: var(--forest);
  color: var(--forest);
}
.step-pip.done .step-pip-num { background: var(--forest); color: #ffffff; border-color: transparent; }
.step-pip-arrow { color: var(--line); }

@media (max-width: 700px) {
  .step-pip { padding: 6px 10px 6px 6px; font-size: 12.5px; }
  .step-pip-arrow { display: none; }
  .generator-inner { padding: 24px 18px; }
}

/* step content */
.step-panel { display: none; animation: fadeIn 0.4s var(--transition); }
.step-panel.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-h {
  font-family: 'Instrument Serif', serif;
  font-size: 30px;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.step-sub {
  color: var(--ink-2);
  font-size: 15px;
  margin-bottom: 28px;
}

/* industry grid */
.industry-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
  gap: 14px;
}

.industry-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 22px 18px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  text-align: left;
}
.industry-card:hover {
  border-color: var(--forest);
  transform: translateY(-2px);
  box-shadow: var(--shadow-soft);
}
.industry-card.selected {
  border-color: var(--forest);
  background: linear-gradient(180deg, #f5f5f7 0%, #FFFFFF 100%);
  box-shadow: 0 0 0 1px var(--forest), var(--shadow-soft);
}
.industry-card.selected::after {
  content: '✓';
  position: absolute;
  top: 14px; right: 14px;
  width: 22px; height: 22px;
  background: var(--forest);
  color: #ffffff;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 12px;
}
.industry-icon {
  width: 40px; height: 40px;
  background: var(--bg-tint);
  border-radius: 12px;
  display: grid; place-items: center;
  color: var(--forest);
}
.industry-card.selected .industry-icon { background: #e5e5ea; }
.industry-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.industry-sub {
  font-size: 12.5px;
  color: var(--muted);
  margin-top: -8px;
}

/* role selector */
.role-search {
  position: relative;
  margin-bottom: 18px;
}
.role-search-input {
  width: 100%;
  padding: 14px 18px 14px 46px;
  font-size: 15px;
  font-family: inherit;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  color: var(--ink);
  outline: none;
  transition: all var(--transition);
}
.role-search-input:focus { border-color: var(--forest); box-shadow: 0 0 0 4px rgba(31,68,56,0.08); }
.role-search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
}

.role-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}
.role-chip {
  padding: 12px 16px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
  color: var(--ink-2);
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.role-chip:hover { border-color: var(--forest); color: var(--ink); }
.role-chip.selected {
  background: var(--forest);
  color: #ffffff;
  border-color: var(--forest);
}
.role-chip-arrow { opacity: 0.5; }

/* task chips */
.task-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.task-chip {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
  color: var(--ink-2);
}
.task-chip:hover { border-color: var(--forest); }
.task-chip.selected {
  background: var(--forest);
  color: #ffffff;
  border-color: var(--forest);
}
.task-chip-emoji { font-size: 15px; }

/* step nav */
.step-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 36px;
  padding-top: 28px;
  border-top: 1px solid var(--line-soft);
  gap: 12px;
}
.step-nav .summary {
  font-size: 13px;
  color: var(--muted);
}
.step-nav .summary strong { color: var(--ink); font-weight: 500; }

/* step 4 — review & generate */
.review-box {
  background: var(--bg-tint);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 24px;
  margin-bottom: 22px;
}
.review-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px dashed var(--line);
  font-size: 14.5px;
}
.review-row:last-child { border-bottom: none; }
.review-row .label { color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
.review-row .value { color: var(--ink); font-weight: 500; text-align: right; }

.generate-cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 28px 0 8px;
}
.generate-btn {
  font-size: 16px;
  padding: 16px 36px;
  background: var(--forest);
  color: #ffffff;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  transition: all var(--transition);
  box-shadow: 0 1px 2px rgba(26,26,23,0.06), 0 16px 32px -12px rgba(31,68,56,0.4);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.generate-btn:hover { transform: translateY(-2px); }
.generate-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

.confidence {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-size: 13px;
  color: var(--muted);
}
.confidence-meter {
  width: 80px;
  height: 6px;
  background: var(--line-soft);
  border-radius: 99px;
  overflow: hidden;
  position: relative;
}
.confidence-meter::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, var(--moss), var(--forest));
  width: 0%;
  border-radius: 99px;
  transition: width 0.6s var(--transition);
}
.confidence-meter.full::after { width: 92%; }

/* ---------- THINKING STATE ---------- */
.thinking {
  display: none;
  padding: 48px 24px;
  text-align: center;
}
.thinking.active { display: block; animation: fadeIn 0.3s; }
.thinking-orb {
  width: 80px; height: 80px;
  margin: 0 auto 24px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, var(--amber-soft), var(--forest), var(--moss), var(--amber), var(--amber-soft));
  position: relative;
  animation: spin 2s linear infinite;
}
.thinking-orb::after {
  content: '';
  position: absolute;
  inset: 8px;
  background: var(--paper);
  border-radius: 50%;
}
.thinking-orb-inner {
  position: absolute;
  inset: 0;
  display: grid; place-items: center;
  color: var(--forest);
  z-index: 2;
}
@keyframes spin { to { transform: rotate(360deg); } }

.thinking-text {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 8px;
}
.thinking-step {
  font-size: 14px;
  color: var(--muted);
  height: 20px;
}

/* ---------- WORKFLOW OUTPUT ---------- */
.workflow-output {
  margin-top: 80px;
  display: none;
}
.workflow-output.active { display: block; animation: fadeIn 0.5s; }

.workflow-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 36px;
  flex-wrap: wrap;
  gap: 20px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--line);
}

.workflow-header h3 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: clamp(28px, 3.4vw, 40px);
  letter-spacing: -0.015em;
  line-height: 1.1;
  margin-bottom: 8px;
}
.workflow-header h3 em { font-style: italic; color: var(--forest); }
.workflow-header p { color: var(--ink-2); font-size: 15px; }

.workflow-stats {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.workflow-stat {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px 18px;
  text-align: center;
  min-width: 110px;
}
.workflow-stat-num {
  font-family: 'Instrument Serif', serif;
  font-size: 26px;
  color: var(--forest);
  line-height: 1;
}
.workflow-stat-label {
  font-size: 11.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 4px;
}

/* timeline */
.timeline {
  position: relative;
  padding-left: 0;
}

.step-card {
  position: relative;
  display: grid;
  grid-template-columns: 64px 1fr;

        { title: 'Define learning outcomes', desc: 'Get clear, measurable outcomes for the lesson before drafting anything.', tool: 'ChatGPT', output: '3–5 learning outcomes', time: '20 min', prompt: 'I\'m a ' + role + '. Draft 3–5 measurable learning outcomes for a 45-minute lesson on [TOPIC] for [GRADE LEVEL] students. Use Bloom\'s taxonomy verbs.' },
        { title: 'Build the lesson plan', desc: 'Turn outcomes into a structured plan with timing.', tool: 'MagicSchool AI', output: 'Full lesson plan with timing', time: '1 hr', prompt: 'Create a 45-minute lesson plan for [TOPIC]. Include: hook (5min), direct instruction (15min), guided practice (15min), independent work (10min). Match these outcomes: [PASTE OUTCOMES].' },

        { title: 'Build the slide deck', desc: 'Turn your plan into a clean teaching deck.', tool: 'Gamma', output: '8–10 slide deck', time: '30 min', prompt: 'Create a 10-slide presentation for teaching [TOPIC]. Include a hook slide, key concepts, examples, a "your turn" activity slide, and a recap. Visual, not text-heavy.' },

        { title: 'Build the deck', desc: 'Visual-first, one idea per slide.', tool: 'Gamma + Excel', output: '8–10 slide finance deck', time: '1 hr', prompt: 'Turn this analysis into an 8-slide deck for [AUDIENCE]: title, exec summary, headline KPI, MoM trend, top 3 drivers, risks, recommendation, next steps. One idea per slide. Plain language, not jargon.' },
        { title: 'Prep for hard questions', desc: 'Anticipate the pushback before the meeting.', tool: 'ChatGPT', output: 'Q&A prep doc', time: '25 min', prompt: 'Given this analysis [PASTE], what are the 8 toughest questions a CFO might ask? Draft a 2-sentence answer for each. Flag any question where I should pull supporting data in advance.' },
      ]
    };
  }

  // Default fallback — works for any combo
  return {
    title: `Use AI for: ${task.t.toLowerCase()}`,
    steps: [
      { title: 'Set the context', desc: 'Tell AI exactly who you are and what success looks like.', tool: 'ChatGPT', output: 'Context briefing', time: '15 min', prompt: 'I\'m a ' + role + ' working in ' + industry.name + '. Today I need to ' + task.t.toLowerCase() + '. My goal is [GOAL]. My constraints are [CONSTRAINTS]. Help me think through this clearly in 5 short bullets.' },
      { title: 'Research', desc: 'Get a clear picture before doing the work.', tool: 'ChatGPT + Google Gemini', output: 'Research notes', time: '45 min', prompt: 'Research [SPECIFIC AREA] for me. Give me: the 3 most important facts, common pitfalls people miss, and 2 examples of how others have done this well. Keep each section short.' },
      { title: 'Draft the work', desc: 'Generate a first version fast, then refine.', tool: 'ChatGPT', output: 'First draft', time: '1 hr', prompt: 'Based on the context and research above, draft [SPECIFIC DELIVERABLE]. Use plain language. Be specific. Avoid generic advice. Aim for [LENGTH/FORMAT].' },
      { title: 'Review & refine', desc: 'A second pass with AI catches what you missed.', tool: 'ChatGPT', output: 'Polished version', time: '30 min', prompt: 'Here\'s my draft: [PASTE]. Give me 3 sharp improvements I should make, 2 things to cut, and 1 thing I\'m missing entirely. Be direct.' },

// ============================================
// LIVE GENERATION API
// ============================================

async function generateLiveWorkflow() {
  const industry = document.getElementById("manualIndustry").value.trim();
  const role = document.getElementById("manualRole").value.trim();
  const goal = document.getElementById("manualGoal").value.trim();

  if (!industry || !role || !goal) {
    alert("Please fill in all fields (Industry, Role, Goal).");
    return;
  }

  document.getElementById("inputForm").style.display = "none";
  const thinking = document.getElementById("thinking");
  thinking.classList.add("active");
  thinking.style.display = "block";

  const steps = [
    "Connecting to AI…",
    "Analyzing your role…",
    "Matching the best AI tools…",
    "Drafting actionable prompts…",
    "Finalizing workflow…"
  ];
  let i = 0;
  const ti = setInterval(() => {
    i++;
    if (i < steps.length) {
      document.getElementById("thinkingStep").textContent = steps[i];
    }
  }, 1200);

  try {
    const response = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ industry, role, goal })
    });

    if (!response.ok) {
        throw new Error("Failed to call backend API");
    }

    const data = await response.json();
    const wf = data.result;

    clearInterval(ti);
    thinking.style.display = "none";
    thinking.classList.remove("active");
    
    renderLiveWorkflow(wf, role);
    document.getElementById("workflowOutput").classList.add("active");
    setTimeout(() => {
      document.getElementById("workflowOutput").scrollIntoView({ behavior: "smooth", block: "start" });
    }, 200);

  } catch (error) {
    clearInterval(ti);
    alert("Error generating workflow. Make sure the Vercel API is running and configured.");
    console.error(error);
    thinking.style.display = "none";
    thinking.classList.remove("active");
    document.getElementById("inputForm").style.display = "block";
  }
}

function renderLiveWorkflow(wf, roleText) {
  document.getElementById("wfTitle").innerHTML = wf.title ? wf.title.replace(/workflow/i, "<em>workflow</em>") : "Your <em>workflow</em>";
  
  // total time
  let totalMin = 0;
  if (wf.steps) {
    totalMin = wf.steps.reduce((acc, s) => {
      if (!s.time) return acc;
      const m = s.time.match(/(\d+)\s*hr/i);
      const min = s.time.match(/(\d+)\s*min/i);
      let total = 0;
      if (m) total += parseInt(m[1]) * 60;
      if (min) total += parseInt(min[1]);
      if (s.time.match(/1\.5\s*hr/i)) total = 90;
      return acc + total;
    }, 0);
  }
  
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  const timeStr = totalMin > 0 ? `${h}h ${m}m` : "1h 30m";
  
  const tools = new Set();
  if (wf.steps) {
    wf.steps.forEach(s => {
        if (s.tool) s.tool.split(/\+|,/).forEach(t => tools.add(t.trim()));
    });
  }

  document.getElementById("wfSubtitle").textContent = `Built for ${roleText} · ${wf.steps ? wf.steps.length : 0} steps · est. ${timeStr} saved`;
  document.getElementById("wfSteps").textContent = wf.steps ? wf.steps.length : 0;
  document.getElementById("wfTime").textContent = timeStr;
  document.getElementById("wfTools").textContent = tools.size || 2;

  if (wf.steps) {
    document.getElementById("timeline").innerHTML = wf.steps.map((s, idx) => `
      <div class="step-card">
        <div class="step-rail">
          <div class="step-number">${idx + 1}</div>
          <div class="step-line"></div>
        </div>
        <div class="step-body">
          <div class="step-body-head">
            <h4 class="step-title">${s.title}</h4>
            <span class="step-time">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Saves ${s.time || "15 min"}
            </span>
          </div>
          <p class="step-desc">${s.desc}</p>
          <div class="step-detail">
            <div class="step-field">
              <div class="step-field-label">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                AI Tool
              </div>
              <div class="step-field-value">${s.tool || "AI Assistant"}</div>
            </div>
            <div class="step-field">
              <div class="step-field-label">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg>
                Expected output
              </div>
              <div class="step-field-value">${s.output || "Generated result"}</div>
            </div>
          </div>
          <div class="step-prompt">
            <div class="step-prompt-label">
              <span>Ready-to-copy prompt</span>
              <button class="copy-btn" onclick="copyPrompt(this, ${idx})">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy
              </button>
            </div>
            <div id="prompt-${idx}">${s.prompt}</div>
          </div>
        </div>
      </div>
    `).join("");
  }
}

function copyPrompt(btn, idx) {
  const text = document.getElementById("prompt-" + idx).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add("copied");
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg> Copied`;
    showToast("Prompt copied to clipboard");
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
    }, 2000);
  });
}

function showToast(msg) {
  const t = document.getElementById("toast");
  document.getElementById("toastText").textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}
